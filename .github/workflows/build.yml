name: Build_SkyStream

on: [push]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install JUCE
        shell: bash
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git JUCE_Library

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxext-dev libxrandr-dev

      - name: Configure and Build
        run: |
          cmake -B build -DJUCE_ROOT=JUCE_Library -Djuce_DIR=JUCE_Library/lib/cmake/juce
          cmake --build build --config Release