name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libgtk-3-dev ninja-build
          echo "CPATH=/usr/include/freetype2" >> $GITHUB_ENV

      - name: Force Build Juceaide and Link
        run: |
          # 1. Configure awal tanpa webkit (untuk menghindari error dependensi)
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON \
            -DJUCE_WEB_BROWSER=OFF
          
          # 2. Bangun juceaide secara spesifik sampai jadi executable
          cmake --build build --target juceaide --config Release
          
          # 3. SUNTIKKAN KE SYSTEM PATH (Ini kunci untuk menghapus error code=127)
          JUCE_EXE=$(find build -name juceaide -type f -executable | head -n 1)
          sudo cp "$JUCE_EXE" /usr/bin/juceaide
          sudo chmod +x /usr/bin/juceaide
          
          # Verifikasi ketersediaan juceaide
          juceaide --version

      - name: Final Build SkyStream TX
        run: |
          # 4. Sekarang jalankan build utama, CMakeLists.txt Anda akan menemukan juceaide di /usr/bin/
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/