name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    name: Build TX via CMake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxext-dev \
            libxrandr-dev \
            libcurl4-openssl-dev \
            pkg-config \
            freeglut3-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            ninja-build
          
          echo "CPATH=/usr/include/freetype2" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON

      - name: Build juceaide and Setup Path
        run: |
          # Bangun juceaide
          cmake --build build --target juceaide --config Release
          
          # Cari lokasi juceaide dan buat link ke /usr/local/bin agar terbaca secara global oleh sistem
          JUCEAIDE_PATH=$(find build -name juceaide -type f -executable | head -n 1)
          sudo ln -s "$(pwd)/$JUCEAIDE_PATH" /usr/local/bin/juceaide

      - name: Build SkyStream_TX
        run: |
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/