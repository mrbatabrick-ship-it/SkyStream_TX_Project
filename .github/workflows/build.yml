name: Build_SkyStream_TX_Linux
on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libgtk-3-dev libwebkit2gtk-4.1-dev ninja-build \
            wget file

      - name: Build
        run: |
          rm -rf build
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_BUILD_HELPER_TOOLS=ON
          cmake --build build --target SkyStream_TX --config Release

      - name: Create AppImage
        run: |
          mkdir -p SkyStream.AppDir/usr/bin
          
          # MENCARI BINARY SECARA AGRESIF (Solusi pasti untuk 'No such file')
          # Mencari file bernama SkyStream_TX yang executable dan bukan di folder juceaide
          REAL_BINARY=$(find build -type f -name "SkyStream_TX" -executable | grep -v "juceaide" | head -n 1)
          
          echo "Binary ditemukan di: $REAL_BINARY"
          cp "$REAL_BINARY" SkyStream.AppDir/usr/bin/SkyStream_TX
          
          strip SkyStream.AppDir/usr/bin/SkyStream_TX
          
          # Metadata AppImage
          echo -e "[Desktop Entry]\nType=Application\nName=SkyStream TX\nExec=SkyStream_TX\nIcon=skystream\nCategories=Audio;" > SkyStream.AppDir/skystream.desktop
          echo -e '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "$HERE/usr/bin/SkyStream_TX" "$@"' > SkyStream.AppDir/AppRun
          chmod +x SkyStream.AppDir/AppRun
          
          wget -O SkyStream.AppDir/skystream.png https://raw.githubusercontent.com/google/material-design-icons/master/png/av/volume_up/black/48dp/1x/ic_volume_up_black_48dp.png
          
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage SkyStream.AppDir SkyStream_TX.AppImage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-AppImage
          path: SkyStream_TX.AppImage