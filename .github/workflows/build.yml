name: Build_SkyStream_TX_Linux
on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libgtk-3-dev libwebkit2gtk-4.1-dev ninja-build \
            wget file # Tambahan untuk AppImage

      - name: Build SkyStream TX
        run: |
          rm -rf build
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON \
            -DJUCE_WEB_BROWSER=OFF \
            -DJUCE_USE_CURL=ON \
            -DCMAKE_CXX_FLAGS="$(pkg-config --cflags gtk+-3.0 webkit2gtk-4.1 libcurl)" \
            -DCMAKE_EXE_LINKER_FLAGS="-lcurl $(pkg-config --libs gtk+-3.0 webkit2gtk-4.1) -lpthread -ldl"
          
          cmake --build build --target juceaide --config Release
          
          JUCE_EXE=$(find build -name juceaide -type f -executable | head -n 1)
          sudo cp "$JUCE_EXE" /usr/bin/juceaide
          sudo chmod +x /usr/bin/juceaide
          sudo ln -sf /usr/bin/juceaide /usr/bin/juce::juceaide

          cmake --build build --config Release --target SkyStream_TX

      - name: Create AppImage
        run: |
          # 1. Persiapkan folder struktur AppDir
          mkdir -p SkyStream.AppDir/usr/bin
          BINARY_PATH=$(find build -name SkyStream_TX -type f -executable | head -n 1)
          
          # 2. Strip Binary (Membuang data debug agar file jauh lebih kecil)
          strip "$BINARY_PATH"
          cp "$BINARY_PATH" SkyStream.AppDir/usr/bin/
          
          # 3. Buat file Desktop (Shortcut)
          cat > SkyStream.AppDir/skystream.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=SkyStream TX
          Exec=SkyStream_TX
          Icon=skystream
          Categories=Audio;
          EOF
          
          # 4. Buat file AppRun (Entry point)
          cat > SkyStream.AppDir/AppRun <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\${0}")")"
          export LD_LIBRARY_PATH="\$HERE/usr/lib:\$LD_LIBRARY_PATH"
          exec "\$HERE/usr/bin/SkyStream_TX" "\$@"
          EOF
          chmod +x SkyStream.AppDir/AppRun
          
          # 5. Unduh icon dummy (Atau gunakan icon Anda jika ada di repo)
          wget -O SkyStream.AppDir/skystream.png https://raw.githubusercontent.com/google/material-design-icons/master/png/av/volume_up/black/48dp/1x/ic_volume_up_black_48dp.png
          ln -s skystream.png SkyStream.AppDir/.DirIcon

          # 6. Unduh appimagetool dan buat AppImage
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage SkyStream.AppDir SkyStream_TX.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-AppImage
          path: SkyStream_TX.AppImage