name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    name: Build TX via CMake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config freeglut3-dev

      - name: Configure and Build
        run: |
          # CMake akan otomatis mengunduh JUCE 8.0.0 sesuai file CMakeLists.txt Anda
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/