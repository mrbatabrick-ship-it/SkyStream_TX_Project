name: Build_SkyStream_TX_Linux
on: [push]
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config freeglut3-dev libgtk-3-dev ninja-build
      
      - name: Force Fix Juceaide
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DJUCE_BUILD_HELPER_TOOLS=ON -DJUCE_WEB_BROWSER=OFF
          cmake --build build --target juceaide --config Release
          
          # AMBIL LOKASI FISIK JUCEAIDE
          JUCE_EXE=$(find build -name juceaide -type f -executable | head -n 1)
          
          # BUAT ALIAS GLOBAL (Agar juceaide bisa dipanggil langsung)
          sudo cp "$JUCE_EXE" /usr/bin/juceaide
          sudo chmod +x /usr/bin/juceaide
          
          # BUAT ALIAS KHUSUS UNTUK NINJA (Agar juce::juceaide tidak error 127)
          sudo ln -sf /usr/bin/juceaide /usr/bin/juce::juceaide

      - name: Final Build
        run: |
          # Sekarang jalankan build utama
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/