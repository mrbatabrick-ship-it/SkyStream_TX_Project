name: Build_SkyStream_TX_Linux

on:
push:
pull_request:

jobs:
build-linux:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        ninja-build \
        pkg-config \
        libasound2-dev \
        libjack-jackd2-dev \
        libfreetype6-dev \
        libx11-dev \
        libxcomposite-dev \
        libxcursor-dev \
        libxinerama-dev \
        libxext-dev \
        libxrandr-dev \
        libxrender-dev \
        libgl1-mesa-dev \
        libglu1-mesa-dev \
        freeglut3-dev \
        libcurl4-openssl-dev \
        libgtk-3-dev

  - name: Configure CMake
    run: |
      cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DJUCE_BUILD_HELPER_TOOLS=ON

  - name: Build juceaide first
    run: |
      cmake --build build --target juceaide

  - name: Build project
    run: |
      cmake --build build --config Release

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: SkyStream_TX_Linux
      path: build/*_artefacts/Release
```
