name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Menginstal library grafis (GTK3) dan audio yang dicari oleh compiler
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libgtk-3-dev ninja-build

      - name: Force Build and Link Juceaide
        run: |
          # 1. Configure build awal
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON \
            -DJUCE_WEB_BROWSER=OFF
          
          # 2. Build juceaide secara khusus
          cmake --build build --target juceaide --config Release
          
          # 3. Trik Alias: Membuat 'juce::juceaide' tersedia di system path
          # Ini untuk mengatasi error [code=127] yang muncul sebelumnya
          JUCE_EXE=$(find build -name juceaide -type f -executable | head -n 1)
          sudo cp "$JUCE_EXE" /usr/bin/juceaide
          sudo chmod +x /usr/bin/juceaide
          sudo ln -sf /usr/bin/juceaide /usr/bin/juce::juceaide

      - name: Final Build SkyStream TX
        run: |
          # Sekarang compiler akan menemukan <gtk/gtk.h> dan juceaide
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/