name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    name: Build TX via Projucer Makefile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config freeglut3-dev
          echo "CPATH=/usr/include/freetype2" >> $GITHUB_ENV

      - name: Build with Makefile
        run: |
          # Masuk ke folder proyek Anda, lalu ke folder hasil export Projucer
          cd SKYSTREAM_TX_Project/Builds/LinuxMakefile
          make CONFIG=Release -j$(nproc)

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: SKYSTREAM_TX_Project/Builds/LinuxMakefile/build/