name: Build_SkyStream_TX_Linux

on: [push]

jobs:
  build-linux:
    name: Build TX via CMake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libwebkit2gtk-4.1-dev libgtk-3-dev ninja-build
          echo "CPATH=/usr/include/freetype2" >> $GITHUB_ENV

      - name: Configure
        run: |
          # Kita tambahkan JUCE_BUILD_HELPER_TOOLS=ON DAN mematikan auto-generation header
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON \
            -DJUCE_COPY_PLUGIN_AFTER_BUILD=OFF

      - name: Build juceaide and Fix Path
        run: |
          # 1. Bangun juceaide
          cmake --build build --target juceaide --config Release
          
          # 2. Ambil lokasi absolut juceaide
          JA_PATH=$(find build -name juceaide -type f -executable | head -n 1)
          JA_DIR=$(dirname "$(pwd)/$JA_PATH")
          
          # 3. MASUKKAN KE PATH SISTEM secara permanen untuk sesi ini
          echo "$JA_DIR" >> $GITHUB_PATH
          
          # 4. Buat symbolic link global sebagai jaring pengaman terakhir
          sudo ln -sf "$(pwd)/$JA_PATH" /usr/local/bin/juceaide

      - name: Build SkyStream_TX
        run: |
          # Sekarang juceaide sudah ada di PATH sistem, cmake harusnya bisa menemukannya
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/