name: Build_SkyStream_TX_Linux
on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev libfreetype6-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev \
            libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config \
            freeglut3-dev libgtk-3-dev libwebkit2gtk-4.1-dev ninja-build \
            wget file # Menambah wget & file untuk AppImage

      - name: Clean and Configure SkyStream TX
        run: |
          rm -rf build
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_BUILD_HELPER_TOOLS=ON \
            -DJUCE_WEB_BROWSER=OFF \
            -DJUCE_USE_CURL=OFF \
            -Djuce_core_USE_CURL=OFF \
            -DCMAKE_CXX_FLAGS="$(pkg-config --cflags gtk+-3.0 webkit2gtk-4.1) -DJUCE_USE_CURL=0" \
            -DCMAKE_EXE_LINKER_FLAGS="$(pkg-config --libs gtk+-3.0 webkit2gtk-4.1) -lpthread -ldl"

      - name: Build juceaide
        run: |
          cmake --build build --target juceaide --config Release
          JUCE_EXE=$(find build -name juceaide -type f -executable | head -n 1)
          sudo cp "$JUCE_EXE" /usr/bin/juceaide
          sudo chmod +x /usr/bin/juceaide
          sudo ln -sf /usr/bin/juceaide /usr/bin/juce::juceaide

      - name: Final Build SkyStream TX
        run: |
          cmake --build build --config Release --target SkyStream_TX

      - name: Create AppImage
        run: |
          # 1. Siapkan folder struktur
          mkdir -p SkyStream.AppDir/usr/bin
          BINARY_PATH=$(find build -name SkyStream_TX -type f -executable | head -n 1)
          
          # 2. Perkecil ukuran binary (Strip)
          strip "$BINARY_PATH"
          cp "$BINARY_PATH" SkyStream.AppDir/usr/bin/
          
          # 3. Buat metadata AppImage
          echo -e "[Desktop Entry]\nType=Application\nName=SkyStream TX\nExec=SkyStream_TX\nIcon=skystream\nCategories=Audio;" > SkyStream.AppDir/skystream.desktop
          echo -e '#!/bin/sh\nHERE="$(dirname "$(readlink -f "${0}")")"\nexec "$HERE/usr/bin/SkyStream_TX" "$@"' > SkyStream.AppDir/AppRun
          chmod +x SkyStream.AppDir/AppRun
          
          # 4. Icon
          wget -O SkyStream.AppDir/skystream.png https://raw.githubusercontent.com/google/material-design-icons/master/png/av/volume_up/black/48dp/1x/ic_volume_up_black_48dp.png
          
          # 5. Packing menjadi AppImage
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage SkyStream.AppDir SkyStream_TX.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-AppImage
          path: SkyStream_TX.AppImage