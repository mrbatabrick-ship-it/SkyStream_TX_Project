name: Build_SkyStream_TX_Linux
on: [push]
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxext-dev libxrandr-dev libcurl4-openssl-dev pkg-config freeglut3-dev libgtk-3-dev ninja-build
      
      - name: Build
        run: |
          # 1. Configure dengan mematikan fitur yang butuh webkit (untuk hindari error code 100/127)
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_WEB_BROWSER=OFF \
            -DJUCE_BUILD_HELPER_TOOLS=ON
          
          # 2. Bangun juceaide dulu agar sistem punya 'mesin' pembuat header
          cmake --build build --target juceaide --config Release
          
          # 3. Beritahu sistem di mana lokasi juceaide agar bisa dipakai otomatis
          export PATH=$PATH:$(find build -name juceaide -type f -executable -exec dirname {} \;)
          
          # 4. Jalankan build utama (Sekarang JuceHeader.h akan tercipta otomatis)
          cmake --build build --config Release --target SkyStream_TX

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SkyStream-TX-Linux
          path: build/SkyStream_TX_artefacts/Release/